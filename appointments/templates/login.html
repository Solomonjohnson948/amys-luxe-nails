{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login | Amy's Luxe Nails</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<section class="auth-page">
    <div class="auth-card">
        <p class="tagline">Welcome Back</p>
        <h1>Login</h1>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="booking-btn">Login</button>
        </form>

        <p>New here? <a href="{% url 'signup' %}">Create account</a></p>
    </div>
</section>

</body>
</html>
